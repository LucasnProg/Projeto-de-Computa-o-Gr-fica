{% extends "base_layout.html" %}

{% block title %}Sutherland-Hodgman{% endblock %}

{% block content %}
<h2>8-Recorte de Polígono (Sutherland-Hodgman)</h2>
<div class="controls-container">

    <div class="controls">
        <div class="control-group">
            <label>Janela de Recorte (Mundo):</label>
            <label>Xmin, Ymin:</label>
            <input type="number" id="clip-xmin" value="-100">
            <input type="number" id="clip-ymin" value="-100">
            <label>Xmax, Ymax:</label>
            <input type="number" id="clip-xmax" value="100">
            <input type="number" id="clip-ymax" value="100">
        </div>

        <div class="control-group">
            <label>Vértices do Polígono (Subject):</label>
            <p style="font-size: 0.8em; margin: 0;">Clique no canvas para adicionar pontos.</p>
            <textarea id="polygon-vertices" class="info-box" rows="5" readonly></textarea>
            <button id="clear-vertices-btn">Limpar Vértices</button>
        </div>

        <div class="control-group">
            <button id="clip-polygon-btn">Recortar Polígono</button>
        </div>
    </div>

    <canvas id="canvas-poligonos" width="600" height="600"></canvas>

    <div class="info-panel">
        <div class="control-group">
            <h4>Informações</h4>
            <label>Resultado:</label>
            <textarea id="clip-info" class="info-box" readonly>Pronto.</textarea>
            <button id="clear-canvas-btn">Limpar Canvas</button>
        </div>
    </div>

</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('mod_8_sutherland_hodgman.static', filename='sh_script.js') }}"></script>
{% endblock %}
