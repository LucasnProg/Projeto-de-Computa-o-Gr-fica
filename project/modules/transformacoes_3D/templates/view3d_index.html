{% extends "base_layout.html" %}

{% block title %}Visualização 3D{% endblock %}

{% block content %}
<h2>Transformações 3D</h2>
<div class="controls-container">

    <div class="controls">
        <div class="control-group">
            <h4>1. Definir Objeto 3D</h4>
            <label>Vértices (x, y, z) - um por linha:</label>
            <textarea id="object-vertices" class="info-box" rows="8"
                style="margin-bottom: 10px; background-color: #f0f0f0;" readonly>0,0,0
80,0,0
80,80,0
0,80,0
0,0,80
80,0,80
80,80,80
0,80,80</textarea>

            <label>Arestas (índice 1, índice 2) - um por linha:</label>
            <textarea id="object-edges" class="info-box" rows="8"
                style="margin-bottom: 10px; background-color: #f0f0f0;" readonly>0,1
1,2
2,3
3,0
4,5
5,6
6,7
7,4
0,4
1,5
2,6
3,7</textarea>
            <button id="generate-object-btn">Gerar/Resetar Objeto</button>
            <button id="OpenGLBtn" style="background-color: #2ecc71; color: white;">Visualização 3D (OpenGL)</button>
        </div>

        <div class="control-group">
            <h4>2. Aplicar Transformações</h4>

            <label>Translação (tx, ty, tz):</label>
            <div class="input-row">
                <input type="number" id="trans-x" value="0" placeholder="Tx">
                <input type="number" id="trans-y" value="0" placeholder="Ty">
                <input type="number" id="trans-z" value="0" placeholder="Tz">
            </div>
            <button id="apply-translation-btn">Aplicar Translação</button>

            <hr style="border-color: #444; margin: 15px 0;">

            <label>Escala (sx, sy, sz):</label>
            <div class="input-row">
                <input type="number" id="scale-x" value="1.2" step="0.1" placeholder="Sx">
                <input type="number" id="scale-y" value="1.2" step="0.1" placeholder="Sy">
                <input type="number" id="scale-z" value="1.2" step="0.1" placeholder="Sz">
            </div>
            <button id="apply-scale-btn">Aplicar Escala</button>

            <hr style="border-color: #444; margin: 15px 0;">

            <label>Rotação (Eixo e Ângulo):</label>
            <div class="input-row">
                <select id="rot-axis" style="flex: 2;">
                    <option value="Rx">Rotação X</option>
                    <option value="Ry">Rotação Y</option>
                    <option value="Rz">Rotação Z</option>
                </select>
                <input type="number" id="rot-angle" value="0" placeholder="Ângulo" style="flex: 1;">
            </div>
            <button id="apply-rotation-btn">Aplicar Rotação</button>

            <hr style="border-color: #444; margin: 15px 0;">

            <label>Cisalhamento (Shear):</label>
            <div class="input-row">
                <select id="shear-axis" style="flex: 2;">
                    <option value="x">Eixo X (shy e shz)</option>
                    <option value="y">Eixo Y (shx e shz)</option>
                    <option value="z">Eixo Z (shx e shy)</option>
                </select>
                <input type="number" id="shear-a" value="0.2" step="0.1" placeholder="Val 1" style="flex: 1;">
                <input type="number" id="shear-b" value="0.2" step="0.1" placeholder="Val 2" style="flex: 1;">
            </div>
            <button id="apply-shear-btn">Aplicar Cisalhamento</button>

            <hr style="border-color: #444; margin: 15px 0;">

            <label>Reflexão (Reflection):</label>
            <div class="input-row">
                <select id="reflect-plane" style="width: 100%;">
                    <option value="xy">Plano XY </option>
                    <option value="xz">Plano XZ </option>
                    <option value="yz">Plano YZ </option>
                </select>
            </div>
            <button id="apply-reflection-btn">Aplicar Reflexão</button>
        </div>
    </div>

    <canvas id="canvas-3d" width="600" height="600"></canvas>

    <div class="info-panel">
        <div class="control-group full-height">
            <h4>Histórico de Transformações</h4>

            <textarea id="history-log" class="info-box" style="flex-grow: 1; margin-bottom: 15px;"
                readonly>Nenhuma transformação aplicada.</textarea>

            <button id="clear-transforms-btn" style="background-color: #dc3545; color: white;">Resetar
                Transformações</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('mod_10_3d_viewing.static', filename='view3d_script.js') }}"></script>
{% endblock %}
