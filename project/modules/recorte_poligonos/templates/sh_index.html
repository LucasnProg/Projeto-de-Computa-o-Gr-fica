{% extends "base_layout.html" %}

{% block title %}Sutherland-Hodgman{% endblock %}

{% block content %}
<h2>Recorte de Polígono (Sutherland-Hodgman)</h2>
<div class="controls-container">

    <div class="controls">
        <div class="control-group">
            <label>Janela de Recorte (Mundo):</label>
            
            <label>Xmin, Ymin:</label>
            <div class="input-row">
                <input type="number" id="clip-xmin" value="-100" placeholder="Xmin">
                <input type="number" id="clip-ymin" value="-100" placeholder="Ymin">
            </div>
            
            <label>Xmax, Ymax:</label>
            <div class="input-row">
                <input type="number" id="clip-xmax" value="100" placeholder="Xmax">
                <input type="number" id="clip-ymax" value="100" placeholder="Ymax">
            </div>
        </div>

        <div class="control-group">
            <label>Vértices do Polígono (Subject):</label>
            <p style="font-size: 11px; color: #aaa; margin: 0 0 8px 0;">Clique no canvas para adicionar pontos.</p>
            <textarea id="polygon-vertices" class="info-box" style="height: 100px; margin-bottom: 10px;" readonly></textarea>
            <button id="clear-vertices-btn">Limpar Vértices</button>
        </div>

        <button id="clip-polygon-btn">Recortar Polígono</button>
    </div>

    <canvas id="canvas-poligonos" width="600" height="600"></canvas>

    <div class="info-panel">
        <div class="control-group full-height">
            <h4>Informações</h4>
            <label>Resultado:</label>
            <textarea id="clip-info" class="info-box" readonly>Pronto para recortar.</textarea>
            <button id="clear-canvas-btn">Limpar Tudo</button>
        </div>
    </div>

</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('mod_8_sutherland_hodgman.static', filename='sh_script.js') }}"></script>
{% endblock %}
