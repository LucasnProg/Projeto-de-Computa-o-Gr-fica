{% extends "base_layout.html" %}

{% block title %}Weiler-Atherton{% endblock %}

{% block content %}
<h2>9-Recorte de Polígono (Weiler-Atherton)</h2>
<div class="controls-container">

    <div class="controls">
        <div class="control-group">
            <label>Modo de Desenho:</label>
            <button id="draw-subject-btn" class="active">Desenhar Polígono (Subject)</button>
            <button id="draw-clip-btn">Desenhar Janela (Clip)</button>
        </div>

        <div class="control-group">
            <label>Vértices (Subject):</label>
            <textarea id="subject-vertices" class="info-box" rows="5" readonly></textarea>
            <label>Vértices (Clip):</label>
            <textarea id="clip-vertices" class="info-box" rows="5" readonly></textarea>
            <button id="clear-vertices-btn">Limpar Vértices</button>
        </div>

        <div class="control-group">
            <button id="clip-polygon-btn">Recortar Polígono (W-A)</button>
        </div>
    </div>

    <canvas id="canvas-poligonos-wa" width="600" height="600"></canvas>

    <div class="info-panel">
        <div class="control-group">
            <h4>Informações</h4>
            <label>Resultado:</label>
            <textarea id="clip-info" class="info-box" readonly>Pronto.</textarea>
            <button id="clear-canvas-btn">Limpar Canvas</button>
        </div>
    </div>

</div>

<style>
    /* Estilo para o botão ativo */
    .controls-container .controls button.active {
        background-color: #4CAF50;
        /* Verde */
        font-weight: bold;
    }
</style>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('mod_9_weiler_atherton.static', filename='wa_script.js') }}"></script>
{% endblock %}
