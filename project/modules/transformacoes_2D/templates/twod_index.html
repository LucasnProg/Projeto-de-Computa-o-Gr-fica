{% extends "base_layout.html" %}

{% block title %}Transformações 2D{% endblock %}

{% block content %}
    <h2>Transformações 2D</h2>
    <div class="controls-container">
        
        <div class="controls">
            <div class="control-group">
                <h4>Configurar Quadrado</h4>
                <label>Tamanho e Posição (X, Y):</label>
                <div class="input-row">
                    <input type="number" id="square-size" value="50" placeholder="Tam">
                    <input type="number" id="start-x" value="0" placeholder="Pos X">
                    <input type="number" id="start-y" value="0" placeholder="Pos Y">
                </div>
                <button id="generate-square-btn">Gerar Quadrado</button>
            </div>

            <div class="control-group">
                <h4>Transformações Geométricas</h4>
                
                <label>Translação (tx, ty):</label>
                <div class="input-row">
                    <input type="number" id="trans-x" value="20" placeholder="Tx">
                    <input type="number" id="trans-y" value="20" placeholder="Ty">
                </div>
                <button id="apply-translation-btn">Aplicar Translação</button>
                
                <hr style="border-color: #444; margin: 15px 0;">
                
                <label>Escala (sx, sy):</label>
                <div class="input-row">
                    <input type="number" id="scale-x" value="1.5" step="0.1" placeholder="Sx">
                    <input type="number" id="scale-y" value="1.5" step="0.1" placeholder="Sy">
                </div>
                <button id="apply-scale-btn">Aplicar Escala</button>
                
                <hr style="border-color: #444; margin: 15px 0;">
                
                <label>Rotação (Ângulo em Graus):</label>
                <input type="number" id="rot-angle" value="45" placeholder="Ângulo">
                <button id="apply-rotation-btn">Aplicar Rotação</button>
            </div>

            <div class="control-group">
                <label>Reflexão:</label>
                <div class="input-row" style="justify-content: flex-start; gap: 20px;">
                    <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                        <input type="checkbox" id="reflect-x"> Em X
                    </label>
                    <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                        <input type="checkbox" id="reflect-y"> Em Y
                    </label>
                </div>
                <button id="apply-reflection-btn" style="margin-top: 10px;">Aplicar Reflexão</button>
                
                <hr style="border-color: #444; margin: 15px 0;">
                
                <label>Cisalhamento (shx, shy):</label>
                <div class="input-row">
                    <input type="number" id="shear-x" value="0.5" step="0.1" placeholder="Shx">
                    <input type="number" id="shear-y" value="0" step="0.1" placeholder="Shy">
                </div>
                <button id="apply-shear-btn">Aplicar Cisalhamento</button>
            </div>
        </div>

        <canvas id="canvas-2d" width="600" height="600"></canvas>
        
        <div class="info-panel">
            <div class="control-group full-height">
                <h4>Informações do Objeto</h4>
                
                <label>Vértices:</label>
                <textarea id="vertices-info" class="info-box" style="height: 90px; margin-bottom: 10px;" readonly>Nenhum objeto gerado.</textarea>
                
                <h4>Histórico de Transformações</h4>
                <textarea id="history-log" class="info-box" style="flex-grow: 1; margin-bottom: 15px;" readonly>Nenhuma transformação aplicada.</textarea>
                
                <button id="clear-btn">Limpar Tudo</button>
            </div>
        </div>

    </div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('mod_5_twod.static', filename='twod_script.js') }}"></script>
{% endblock %}
